<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Configurator</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Import map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-panel">
        <h2>Car Configurator</h2>
        <div class="color-options">
            <button class="color-btn" data-color="#ff0000" style="background-color: #ff0000;"></button>
            <button class="color-btn" data-color="#0000ff" style="background-color: #0000ff;"></button>
            <button class="color-btn" data-color="#ffa500" style="background-color: #ffa500;"></button>
            <button class="color-btn" data-color="#000000" style="background-color: #000000;"></button>
            <button class="color-btn" data-color="#ffffff" style="background-color: #ffffff;"></button>
        </div>
        <div class="model-options" style="margin-top:20px;">
            <h3>Select Model</h3>
            <select id="model-select">
                <option value="/cars/glbimages/2021_tata_safari.glb">Tata Safari</option>
                <option value="/cars/glbimages/tata_2000g.c_model.glb">Tata 2000G</option>
                <option value="/cars/glbimages/tata_nano.glb">Tata Nano</option>
                <option value="/cars/glbimages/tata_punch_tropical_mist.glb">Tata Punch</option>
            </select>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
