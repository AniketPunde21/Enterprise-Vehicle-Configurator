<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <!-- Studio Background -->
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </radialGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <g transform="translate(693.9692620785909, 400)" filter="url(#shadow)">
        <!-- Car Body Box scaled based on rotation angle -->
        <rect x="-187.23688550569096" y="-100" width="374.4737710113819" height="150" rx="30" fill="#555555"/>
        
        <!-- Greenhouse / Windows -->
        <path d="M -93.61844275284548 -100 L -62.41229516856366 -180 L 62.41229516856366 -180 L 93.61844275284548 -100 Z" fill="#111111"/>
        
        <!-- Wheels -->
        <circle cx="-124.82459033712732" cy="50" r="60" fill="#222"/>
        <circle cx="124.82459033712732" cy="50" r="60" fill="#222"/>
        <circle cx="-124.82459033712732" cy="50" r="40" fill="#ddd"/>
        <circle cx="124.82459033712732" cy="50" r="40" fill="#ddd"/>
    </g>

    <text x="600" y="600" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">
        LEVANTE : GREY EXTERIOR : FRAME 11/36
    </text>
</svg>