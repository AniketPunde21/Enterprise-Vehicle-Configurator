<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <!-- Studio Background -->
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </radialGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <g transform="translate(698.4807753012208, 400)" filter="url(#shadow)">
        <!-- Car Body Box scaled based on rotation angle -->
        <rect x="-181.82306963853506" y="-100" width="363.6461392770701" height="150" rx="30" fill="#111111"/>
        
        <!-- Greenhouse / Windows -->
        <path d="M -90.91153481926753 -100 L -60.60768987951168 -180 L 60.60768987951168 -180 L 90.91153481926753 -100 Z" fill="#111111"/>
        
        <!-- Wheels -->
        <circle cx="-121.21537975902336" cy="50" r="60" fill="#222"/>
        <circle cx="121.21537975902336" cy="50" r="60" fill="#222"/>
        <circle cx="-121.21537975902336" cy="50" r="40" fill="#ddd"/>
        <circle cx="121.21537975902336" cy="50" r="40" fill="#ddd"/>
    </g>

    <text x="600" y="600" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">
        GRECALE : BLACK EXTERIOR : FRAME 08/36
    </text>
</svg>