<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <!-- Studio Background -->
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </radialGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <g transform="translate(664.278760968654, 400)" filter="url(#shadow)">
        <!-- Car Body Box scaled based on rotation angle -->
        <rect x="-222.8654868376153" y="-100" width="445.7309736752306" height="150" rx="30" fill="#f5f5f5"/>
        
        <!-- Greenhouse / Windows -->
        <path d="M -111.43274341880765 -100 L -74.28849561253843 -180 L 74.28849561253843 -180 L 111.43274341880765 -100 Z" fill="#111111"/>
        
        <!-- Wheels -->
        <circle cx="-148.57699122507685" cy="50" r="60" fill="#222"/>
        <circle cx="148.57699122507685" cy="50" r="60" fill="#222"/>
        <circle cx="-148.57699122507685" cy="50" r="40" fill="#ddd"/>
        <circle cx="148.57699122507685" cy="50" r="40" fill="#ddd"/>
    </g>

    <text x="600" y="600" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">
        MC20 : WHITE EXTERIOR : FRAME 04/36
    </text>
