<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <!-- Studio Background -->
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </radialGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <g transform="translate(523.3955556881021, 400)" filter="url(#shadow)">
        <!-- Car Body Box scaled based on rotation angle -->
        <rect x="-208.07466682572266" y="-100" width="416.1493336514453" height="150" rx="30" fill="#111111"/>
        
        <!-- Greenhouse / Windows -->
        <path d="M -104.03733341286133 -100 L -69.35822227524089 -180 L 69.35822227524089 -180 L 104.03733341286133 -100 Z" fill="#111111"/>
        
        <!-- Wheels -->
        <circle cx="-138.71644455048178" cy="50" r="60" fill="#222"/>
        <circle cx="138.71644455048178" cy="50" r="60" fill="#222"/>
        <circle cx="-138.71644455048178" cy="50" r="40" fill="#ddd"/>
        <circle cx="138.71644455048178" cy="50" r="40" fill="#ddd"/>
    </g>

    <text x="600" y="600" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">
        MC20 : BLACK EXTERIOR : FRAME 23/36
    </text>
</svg>