<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
    <!-- Studio Background -->
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e0e0"/>
        </radialGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <g transform="translate(550, 400)" filter="url(#shadow)">
        <!-- Car Body Box scaled based on rotation angle -->
        <rect x="-239.99999999999994" y="-100" width="479.9999999999999" height="150" rx="30" fill="#111111"/>
        
        <!-- Greenhouse / Windows -->
        <path d="M -119.99999999999997 -100 L -79.99999999999999 -180 L 79.99999999999999 -180 L 119.99999999999997 -100 Z" fill="#111111"/>
        
        <!-- Wheels -->
        <circle cx="-159.99999999999997" cy="50" r="60" fill="#222"/>
        <circle cx="159.99999999999997" cy="50" r="60" fill="#222"/>
        <circle cx="-159.99999999999997" cy="50" r="40" fill="#ddd"/>
        <circle cx="159.99999999999997" cy="50" r="40" fill="#ddd"/>
    </g>

    <text x="600" y="600" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">
        MC20 : BLACK EXTERIOR : FRAME 33/36
    </text>
</svg>